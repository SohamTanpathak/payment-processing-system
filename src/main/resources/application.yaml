spring:
  application:
    name: payment-processing-system
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paymentsDB}
    username: ${DB_USER:}
    password: ${DB_PASS:}
    #DB url, username and password are stored in Env variables under Configurations of this project
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

vault:
  master-key: dscekfnwknalsdmaldimwledmalsldaeclsdcjsdckjeneoricwkfjcnerjcnsfverpq

payment:
  simulator:
    poll-interval-ms: 5000
    chaos-mode: NORMAL
    methods:
      CARD:
        min-delay-seconds: 2
        max-delay-seconds: 6
        success-rate: 90
      UPI:
        min-delay-seconds: 1
        max-delay-seconds: 3
        success-rate: 95
      NET_BANKING:
        min-delay-seconds: 4
        max-delay-seconds: 10
        success-rate: 80
