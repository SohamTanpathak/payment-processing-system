spring:
  application:
    name: payment-processing-system
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/paymentsDB}
    username: ${DB_USER:}
    password: ${DB_PASS:}
    #DB url, username and password are stored in Env variables under Configurations of this project
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

